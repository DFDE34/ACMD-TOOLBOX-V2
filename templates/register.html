<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACMD Toolbox — Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#050a0e;--bg2:#0a1520;--bg3:#0d1f2d;--accent:#00ff88;--accent2:#00ccff;--accent3:#ff3366;--text:#c8e6f5;--text-dim:#4a7a9b;--border:#1a3a4a; }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 50% 50%,rgba(0,204,255,0.05) 0%,transparent 60%),linear-gradient(rgba(0,255,136,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.02) 1px,transparent 1px);background-size:100% 100%,40px 40px,40px 40px;}
        .box{width:400px;border:1px solid var(--border);background:var(--bg2);padding:3rem 2.5rem;position:relative;}
        .box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent2),transparent);}
        .logo{text-align:center;font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:900;color:var(--accent2);text-shadow:0 0 30px rgba(0,204,255,0.5);letter-spacing:4px;margin-bottom:0.5rem;}
        .subtitle{text-align:center;font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--text-dim);letter-spacing:3px;margin-bottom:2.5rem;}
        label{font-family:'Share Tech Mono',monospace;font-size:0.72rem;color:var(--text-dim);letter-spacing:2px;display:block;margin-bottom:0.3rem;text-transform:uppercase;}
        input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--accent2);padding:0.7rem 0.9rem;font-family:'Share Tech Mono',monospace;font-size:0.9rem;outline:none;margin-bottom:1.2rem;transition:border-color 0.2s;}
        input:focus{border-color:var(--accent2);box-shadow:0 0 10px rgba(0,204,255,0.2);}
        .btn{width:100%;background:transparent;border:1px solid var(--accent2);color:var(--accent2);padding:0.75rem;font-family:'Share Tech Mono',monospace;font-size:0.9rem;letter-spacing:4px;cursor:pointer;text-transform:uppercase;transition:all 0.2s;margin-top:0.5rem;}
        .btn:hover:not(:disabled){background:var(--accent2);color:var(--bg);}
        .btn:disabled{opacity:0.35;cursor:not-allowed;}
        .flash{background:rgba(255,51,102,0.1);border:1px solid var(--accent3);color:var(--accent3);padding:0.6rem 0.8rem;font-family:'Share Tech Mono',monospace;font-size:0.8rem;margin-bottom:1rem;}
        .flash::before{content:'[!] ';}
        .link-row{text-align:center;margin-top:1.5rem;font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:var(--text-dim);}
        .link-row a{color:var(--accent);text-decoration:none;}
    </style>
</head>
<body>
<div class="box">
    <div class="logo">NEW USER</div>
    <div class="subtitle">Créer un compte ACMD Toolbox</div>
    {% with messages = get_flashed_messages() %}{% if messages %}{% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}{% endif %}{% endwith %}
    <form method="POST">
        <label>// Identifiant (min 3 chars)</label>
        <input type="text" name="username" placeholder="hacker42" required>
        <label>// Mot de passe</label>
        <input type="password" name="password" id="password" placeholder="••••••••••••" required>
        <div id="pwd-rules" style="margin:-0.8rem 0 1rem;font-family:'Share Tech Mono',monospace;font-size:0.68rem;line-height:1.7;">
            <span id="r-len"  style="color:var(--accent3)">✗ 10 caractères min</span><br>
            <span id="r-upper" style="color:var(--accent3)">✗ 1 majuscule</span><br>
            <span id="r-lower" style="color:var(--accent3)">✗ 1 minuscule</span><br>
            <span id="r-digit" style="color:var(--accent3)">✗ 1 chiffre</span><br>
            <span id="r-spec"  style="color:var(--accent3)">✗ 1 caractère spécial (!@#$%...)</span>
        </div>
        <button type="submit" class="btn" id="submitBtn" disabled>[ Créer le compte ]</button>
    </form>
    <script>
        const u   = document.querySelector('input[name=username]');
        const p   = document.getElementById('password');
        const btn = document.getElementById('submitBtn');
        const rules = {
            'r-len':   v => v.length >= 10,
            'r-upper': v => /[A-Z]/.test(v),
            'r-lower': v => /[a-z]/.test(v),
            'r-digit': v => /[0-9]/.test(v),
            'r-spec':  v => /[!@#$%^&*()\-_=+\[\]{}|;:,.<>?/]/.test(v),
        };
        function check() {
            const val = p.value;
            let allOk = true;
            for (const [id, fn] of Object.entries(rules)) {
                const ok = fn(val);
                const el = document.getElementById(id);
                el.style.color = ok ? 'var(--accent)' : 'var(--accent3)';
                el.textContent = (ok ? '✓ ' : '✗ ') + el.textContent.slice(2);
                if (!ok) allOk = false;
            }
            btn.disabled = !u.value.trim() || !allOk;
        }
        u.addEventListener('input', check);
        p.addEventListener('input', check);
    </script>
    <div class="link-row">Déjà un compte ? <a href="{{ url_for('login') }}">Se connecter</a></div>
</div>
</body>
</html>
