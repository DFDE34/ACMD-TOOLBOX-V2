<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACMD Toolbox — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050a0e; --bg2: #0a1520; --bg3: #0d1f2d;
            --accent: #00ff88; --accent2: #00ccff; --accent3: #ff3366;
            --text: #c8e6f5; --text-dim: #4a7a9b; --border: #1a3a4a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background-image:
                radial-gradient(ellipse at 50% 50%, rgba(0,255,136,0.05) 0%, transparent 60%),
                linear-gradient(rgba(0,255,136,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }
        .login-box {
            width: 400px;
            border: 1px solid var(--border);
            background: var(--bg2);
            padding: 3rem 2.5rem;
            position: relative;
        }
        .login-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }
        .logo {
            text-align: center;
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(0,255,136,0.5);
            letter-spacing: 5px;
            margin-bottom: 0.5rem;
        }
        .logo span { color: var(--accent2); }
        .subtitle {
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 3px;
            margin-bottom: 2.5rem;
        }
        .blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.72rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            display: block;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 0.7rem 0.9rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            outline: none;
            margin-bottom: 1.2rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,255,136,0.2); }
        .btn-submit {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.75rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        .btn-submit:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 20px rgba(0,255,136,0.4); }
        .flash {
            background: rgba(255,51,102,0.1);
            border: 1px solid var(--accent3);
            color: var(--accent3);
            padding: 0.6rem 0.8rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
        .flash::before { content: '[!] '; }
        .link-row {
            text-align: center;
            margin-top: 1.5rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        .link-row a { color: var(--accent2); text-decoration: none; }
        .link-row a:hover { text-shadow: 0 0 10px rgba(0,204,255,0.5); }
        .corner {
            position: absolute;
            width: 12px; height: 12px;
            border-color: var(--accent2);
            border-style: solid;
        }
        .corner-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
        .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="logo">ACMD<span>_</span></div>
    <div class="subtitle">HACKER TOOLBOX v1.0 <span class="blink">█</span></div>
    {% with messages = get_flashed_messages() %}
    {% if messages %}{% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}{% endif %}
    {% endwith %}
    <form method="POST">
        <label>// Identifiant</label>
        <input type="text" name="username" placeholder="root" autocomplete="off" required>
        <label>// Mot de passe</label>
        <input type="password" name="password" placeholder="••••••••" required>
        <button type="submit" class="btn-submit">[ Accès ]</button>
    </form>
    <div class="link-row">
        Pas de compte ? <a href="{{ url_for('register') }}">Créer un accès</a>
    </div>
</div>
</body>
</html>
